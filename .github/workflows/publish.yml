name: Publish Package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag ref to publish (refs/tags/vX.Y.Z)"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Trusted npm publish
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Guard manual publish branch
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Manual publish workflow_dispatch is allowed only from refs/heads/main (current: $GITHUB_REF)"
            exit 1
          fi

          if [[ ! "${{ github.event.inputs.tag }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Manual publish requires a semantic version tag ref like refs/tags/vX.Y.Z (current: ${{ github.event.inputs.tag }})"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify release
        run: npm run release:final

      - name: Publish with provenance
        run: npm publish --provenance
